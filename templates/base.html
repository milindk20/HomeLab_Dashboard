<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ dashboard_title }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --theme-color: {{ theme_color }};
            --font-family: {{ font_family }};
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: rgba(30, 30, 50, 0.6);
            --bg-card-hover: rgba(40, 40, 70, 0.8);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.5);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-gradient: linear-gradient(135deg, var(--theme-color), {{ theme_color }}88);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --card-shadow-hover: 0 20px 50px rgba(0, 0, 0, 0.5);
            --glow-color: {{ theme_color }}40;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--font-family);
            min-height: 100vh;
            {% if wallpaper %}
            background: linear-gradient(135deg, rgba(15,15,26,0.9), rgba(26,26,46,0.85)), url('{{ wallpaper }}');
            {% else %}
            background: 
                radial-gradient(ellipse at 20% 20%, {{ theme_color }}15 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, #7c3aed10 0%, transparent 50%),
                linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
            {% endif %}
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
        }
        
        .navbar {
            background: rgba(15, 15, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }
        
        .navbar h1 {
            font-size: 1.4rem;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .navbar h1 i {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 0.5rem;
        }
        
        .navbar a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .navbar a:hover {
            background: var(--theme-color);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--glow-color);
        }
        
        .navbar-search {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50px;
            padding: 0.3rem;
            gap: 0.3rem;
            transition: all 0.3s;
        }
        
        .navbar-search:focus-within {
            border-color: var(--theme-color);
            box-shadow: 0 0 20px var(--glow-color);
        }
        
        .navbar-search select {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.5rem 0.8rem;
            border-radius: 20px;
            cursor: pointer;
            outline: none;
            font-size: 0.85rem;
        }
        
        .navbar-search select option {
            background: var(--bg-secondary);
        }
        
        .navbar-search input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            padding: 0.5rem 0.8rem;
            width: 180px;
            outline: none;
            font-size: 0.9rem;
        }
        
        .navbar-search input::placeholder {
            color: var(--text-muted);
        }
        
        .navbar-search button {
            background: var(--accent-gradient);
            border: none;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        
        .navbar-search button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px var(--glow-color);
        }
        
        .navbar-links {
            display: flex;
            gap: 0.5rem;
        }
        
        .navbar-links a span {
            display: none;
        }
        
        .mobile-search-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            z-index: 100;
            gap: 0.5rem;
            align-items: center;
        }
        
        .mobile-search-bar select {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.6rem;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
            font-size: 0.85rem;
        }
        
        .mobile-search-bar select option {
            background: var(--bg-secondary);
        }
        
        .mobile-search-bar input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.6rem 1rem;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
        }
        
        .mobile-search-bar input::placeholder {
            color: var(--text-muted);
        }
        
        .mobile-search-bar button {
            background: var(--accent-gradient);
            border: none;
            color: #fff;
            padding: 0.6rem 1rem;
            border-radius: 10px;
            cursor: pointer;
        }
        
        @media (max-width: 768px) {
            .mobile-hidden {
                display: none !important;
            }
            
            .mobile-search-bar {
                display: flex;
            }
            
            .container {
                padding-bottom: 5rem;
            }
        }
        
        @media (min-width: 900px) {
            .navbar-links a span {
                display: inline;
            }
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2.5rem;
        }
        
        .flash-messages {
            margin-bottom: 1.5rem;
        }
        
        .flash {
            padding: 1rem 1.5rem;
            border-radius: 12px;
            margin-bottom: 0.75rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .flash.success {
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2), rgba(34, 197, 94, 0.1));
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }
        
        .flash.error {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(239, 68, 68, 0.1));
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }
        
        .btn {
            padding: 0.8rem 1.75rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            box-shadow: 0 4px 15px var(--glow-color);
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--glow-color);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
        }
        
        .btn-danger:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--theme-color);
        }
        
        .form-group {
            margin-bottom: 1.25rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.6rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--theme-color);
            box-shadow: 0 0 20px var(--glow-color);
        }
        
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 1.75rem;
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card:hover {
            transform: translateY(-8px);
            background: var(--bg-card-hover);
            box-shadow: var(--card-shadow-hover);
            border-color: {{ theme_color }}40;
        }
        
        .grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 1fr;
        }
        
        @media (min-width: 640px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (min-width: 1024px) {
            .grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (min-width: 1400px) {
            .grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        .service-card {
            text-decoration: none;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }
        
        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-gradient);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .service-card:hover::before {
            opacity: 1;
        }
        
        .service-card .icon {
            font-size: 2.75rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.25rem;
            display: inline-block;
            transition: transform 0.3s;
        }
        
        .service-card:hover .icon {
            transform: scale(1.1);
        }
        
        .service-card h3 {
            font-size: 1.2rem;
            margin-bottom: 0.6rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        
        .service-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
        }
        
        .service-card .category {
            display: inline-block;
            padding: 0.35rem 0.9rem;
            background: {{ theme_color }}20;
            border: 1px solid {{ theme_color }}40;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 1rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        
        .status-indicator {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.3rem 0.6rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .status-indicator .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        .status-indicator.online {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        
        .status-indicator.online .status-dot {
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }
        
        .status-indicator.offline {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        
        .status-indicator.offline .status-dot {
            background: #f87171;
            box-shadow: 0 0 8px #f87171;
            animation: none;
        }
        
        .response-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-left: 0.5rem;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(180deg, var(--bg-secondary), var(--bg-primary));
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.75rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .modal-header h2 {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 1.4rem;
        }
        
        .modal-close {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-close:hover {
            background: #ef4444;
            color: #fff;
            border-color: #ef4444;
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
            overflow-x: auto;
        }
        
        .tab {
            padding: 0.75rem 1.5rem;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .tab.active {
            background: var(--accent-gradient);
            border-color: transparent;
            color: #fff;
        }
        
        .tab:hover:not(.active) {
            background: var(--bg-card);
            border-color: var(--theme-color);
        }
        
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .settings-grid {
            display: grid;
            gap: 1.5rem;
            grid-template-columns: 1fr;
        }
        
        @media (min-width: 768px) {
            .settings-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        .service-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .service-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1.25rem;
            border-radius: 14px;
            transition: all 0.3s;
        }
        
        .service-item:hover {
            border-color: {{ theme_color }}40;
            background: var(--bg-card-hover);
        }
        
        .service-item-info {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        
        .service-item-info i {
            font-size: 1.75rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .service-item-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .service-item-actions button,
        .service-item-actions a {
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            color: #fff;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        
        .service-item-actions .edit {
            background: var(--accent-gradient);
        }
        
        .service-item-actions .edit:hover {
            transform: scale(1.1);
        }
        
        .service-item-actions .delete {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }
        
        .service-item-actions .delete:hover {
            transform: scale(1.1);
        }
        
        .category-filter {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        
        .category-filter button {
            padding: 0.6rem 1.25rem;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            font-size: 0.85rem;
        }
        
        .category-filter button.active,
        .category-filter button:hover {
            background: var(--accent-gradient);
            border-color: transparent;
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px var(--glow-color);
        }
        
        .search-bar {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 0.75rem 1.25rem;
            margin-bottom: 2rem;
            max-width: 450px;
            transition: all 0.3s;
        }
        
        .search-bar:focus-within {
            border-color: var(--theme-color);
            box-shadow: 0 0 25px var(--glow-color);
        }
        
        .search-bar i {
            color: var(--text-muted);
            margin-right: 0.85rem;
            font-size: 1rem;
        }
        
        .search-bar input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1rem;
            width: 100%;
            outline: none;
        }
        
        .search-bar input::placeholder {
            color: var(--text-muted);
        }
        
        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .empty-state h2 {
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            font-weight: 600;
        }
        
        .empty-state p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .color-picker-wrapper input[type="color"] {
            width: 50px;
            height: 44px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            padding: 0;
            background: var(--bg-card);
        }
        
        .color-picker-wrapper input[type="text"] {
            flex: 1;
        }
        
        @media (max-width: 768px) {
            .navbar {
                padding: 0.75rem 1rem;
                flex-wrap: wrap;
                gap: 0.75rem;
            }
            
            .navbar h1 {
                font-size: 1.1rem;
            }
            
            .navbar-search {
                order: 3;
                width: 100%;
            }
            
            .navbar-search input {
                width: 100%;
            }
            
            .container {
                padding: 1.25rem;
            }
            
            .service-card .icon {
                font-size: 2.25rem;
            }
            
            .tabs {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .tab {
                flex-shrink: 0;
            }
        }
        
        @media (min-width: 1920px) {
            .grid {
                grid-template-columns: repeat(5, 1fr);
            }
            
            .service-card .icon {
                font-size: 3rem;
            }
            
            .service-card h3 {
                font-size: 1.35rem;
            }
            
            .service-card p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    <script>
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }
        
        function filterCategory(category) {
            document.querySelectorAll('.category-filter button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            document.querySelectorAll('.service-card').forEach(card => {
                if (category === 'all' || card.dataset.category === category) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal.active').forEach(modal => {
                    modal.classList.remove('active');
                });
            }
        });
        
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
