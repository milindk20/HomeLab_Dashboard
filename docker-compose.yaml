services:
  homelab_dashboard:
    image: ubuntu:24.04
    container_name: homelab_dashboard
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./data:/app
    ports: 
      - "5001:5001"
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y git python3 python3-pip &&
      git clone https://github.com/milindk20/HomeLab_Dashboard /app &&
      cd /app &&
      pip3 install -r requirements.txt &&
      python3 app.py
      "
