services:
  homelab_dashboard:
    image: ubuntu:24.04
    container_name: homelab_dashboard
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./data:/app
    ports: 
      - "5001:5001"
    command: >
      bash -c "
      apt-get update &&
      apt-get install -y git python3 python3-pip python3-venv && mkdir -p /app &&
      git clone https://github.com/milindk20/HomeLab_Dashboard /app || true &&
      cd /app &&
      python3 -m venv venv &&
      . venv/bin/activate &&
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python app.py
      "
