services:
  homelab_dashboard:
    image: python:3.12-slim
    container_name: homelab_dashboard
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./data:/app/data
    ports: 
      - "5001:5001"
    environment:
      - FLASK_ENV=production
    command: >
      bash -c "
      pip install --upgrade pip &&
      pip install -r requirements.txt &&
      python app.py
      "
